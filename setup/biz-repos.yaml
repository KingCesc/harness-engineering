# GitLab 基础信息
gitlab:
  host: git-web.shulex-tech.com
  ssh_host: git-ssh.shulex-tech.com

# Tailscale login server URL
tailscale:
  login_server: https://hs.shulex.com

# 本地工作目录根路径
workspace: ~/workspace

# 业务线定义
businesses:
  - name: PLG 订阅支付系统
    key: plg-subscription
    repos:
      - group: backend
        name: shulex-cloud
        ssh: git@git-ssh.shulex-tech.com:cloud/shulex-cloud.git
      - group: frontend
        name: plg-agents
        ssh: git@git-ssh.shulex-tech.com:shulex-fe/plg-agents.git

  - name: PLG Onboarding链路
    key: user
    repos:
      - group: backend
        name: shulex-cloud
        ssh: git@git-ssh.shulex-tech.com:cloud/shulex-cloud.git
      - group: frontend
        name: plg-agents
        ssh: git@git-ssh.shulex-tech.com:shulex-fe/plg-agents.git
